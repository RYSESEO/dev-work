<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#225f59"/>
      <stop offset="100%" stop-color="#2f7d74"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Command center hexagon -->
  <polygon points="256,80 396,160 396,320 256,400 116,320 116,160" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>
  <!-- Inner circuit lines -->
  <line x1="256" y1="140" x2="256" y2="240" stroke="rgba(255,255,255,0.9)" stroke-width="3" stroke-linecap="round"/>
  <line x1="256" y1="240" x2="196" y2="300" stroke="rgba(255,255,255,0.9)" stroke-width="3" stroke-linecap="round"/>
  <line x1="256" y1="240" x2="316" y2="300" stroke="rgba(255,255,255,0.9)" stroke-width="3" stroke-linecap="round"/>
  <!-- Agent nodes -->
  <circle cx="256" cy="140" r="16" fill="#ffffff"/>
  <circle cx="196" cy="300" r="14" fill="rgba(255,255,255,0.85)"/>
  <circle cx="316" cy="300" r="14" fill="rgba(255,255,255,0.85)"/>
  <!-- Center hub -->
  <circle cx="256" cy="240" r="22" fill="#ffffff"/>
  <circle cx="256" cy="240" r="10" fill="#2f7d74"/>
  <!-- Small satellite dots -->
  <circle cx="160" cy="190" r="6" fill="rgba(255,255,255,0.5)"/>
  <circle cx="352" cy="190" r="6" fill="rgba(255,255,255,0.5)"/>
  <circle cx="160" cy="290" r="6" fill="rgba(255,255,255,0.4)"/>
  <circle cx="352" cy="290" r="6" fill="rgba(255,255,255,0.4)"/>
  <!-- Connection lines to satellites -->
  <line x1="240" y1="240" x2="166" y2="194" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <line x1="272" y1="240" x2="346" y2="194" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
</svg>
