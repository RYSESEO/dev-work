# dev-work GitLab CI Template
#
# Include this in your .gitlab-ci.yml to report pipeline results to dev-work.
#
# Variables required:
#   DEVWORK_API_KEY  - API key from dev-work Integrations tab
#   DEVWORK_HOST     - Webhook server host (default: 127.0.0.1)
#   DEVWORK_PORT     - Webhook server port (default: 9400)
#
# Usage:
#   include:
#     - remote: 'https://raw.githubusercontent.com/RYSESEO/dev-work/main/packages/adapters/gitlab-ci-template.yml'
#
#   build:
#     extends: .devwork-tracked
#     variables:
#       DEVWORK_AGENT_NAME: "gitlab-ci"
#     script:
#       - npm ci && npm test

.devwork-report: &devwork_report
  - |
    DEVWORK_HOST="${DEVWORK_HOST:-127.0.0.1}"
    DEVWORK_PORT="${DEVWORK_PORT:-9400}"
    DEVWORK_AGENT="${DEVWORK_AGENT_NAME:-gitlab-ci}"
    DEVWORK_BASE="http://${DEVWORK_HOST}:${DEVWORK_PORT}"

    devwork_send() {
      local event_type="$1"
      local payload="$2"
      curl -s -X POST "${DEVWORK_BASE}/api/v1/events" \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer ${DEVWORK_API_KEY}" \
        -d "{\"type\": \"${event_type}\", \"payload\": ${payload}}" \
        || echo "[dev-work] Warning: Failed to send ${event_type} event"
    }

.devwork-tracked:
  before_script:
    - *devwork_report
    - export DEVWORK_RUN_ID="cirun_$(date +%s)_${CI_PIPELINE_ID}"
    - export DEVWORK_START_TIME=$(date +%s%N)
    - |
      devwork_send "run.started" "{
        \"runId\": \"${DEVWORK_RUN_ID}\",
        \"agentName\": \"${DEVWORK_AGENT}\",
        \"status\": \"started\",
        \"prompt\": \"${CI_JOB_NAME}\",
        \"metadata\": {
          \"repo\": \"${CI_PROJECT_PATH}\",
          \"sha\": \"${CI_COMMIT_SHORT_SHA}\",
          \"ref\": \"${CI_COMMIT_REF_NAME}\",
          \"pipeline\": \"${CI_PIPELINE_ID}\",
          \"job\": \"${CI_JOB_NAME}\"
        }
      }"
  after_script:
    - *devwork_report
    - |
      DURATION_NS=$(($(date +%s%N) - ${DEVWORK_START_TIME:-$(date +%s%N)}))
      DURATION_MS=$((DURATION_NS / 1000000))
      if [ "${CI_JOB_STATUS}" = "success" ]; then
        devwork_send "run.completed" "{
          \"runId\": \"${DEVWORK_RUN_ID}\",
          \"agentName\": \"${DEVWORK_AGENT}\",
          \"status\": \"completed\",
          \"output\": \"Job ${CI_JOB_NAME} completed successfully\",
          \"durationMs\": ${DURATION_MS},
          \"metadata\": {
            \"repo\": \"${CI_PROJECT_PATH}\",
            \"sha\": \"${CI_COMMIT_SHORT_SHA}\",
            \"exitCode\": \"0\"
          }
        }"
      else
        devwork_send "run.failed" "{
          \"runId\": \"${DEVWORK_RUN_ID}\",
          \"agentName\": \"${DEVWORK_AGENT}\",
          \"status\": \"failed\",
          \"error\": \"Job ${CI_JOB_NAME} failed with status ${CI_JOB_STATUS}\",
          \"durationMs\": ${DURATION_MS},
          \"metadata\": {
            \"repo\": \"${CI_PROJECT_PATH}\",
            \"sha\": \"${CI_COMMIT_SHORT_SHA}\",
            \"exitCode\": \"1\"
          }
        }"
      fi
